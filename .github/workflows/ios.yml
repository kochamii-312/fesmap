# iOS アプリ CI パイプライン
name: iOS CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"

jobs:
  ios-ci:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      # YOLPアプリケーションIDを環境変数として設定
      - name: YOLP App ID を環境変数に設定
        run: echo "YOLP_APP_ID=${{ secrets.YOLP_APP_ID }}" >> $GITHUB_ENV

      - name: Xcode バージョン選択
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: SwiftLint インストール・実行
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: XcodeGen インストール・プロジェクト生成
        run: |
          brew install xcodegen
          xcodegen generate

      - name: 利用可能なシミュレータを確認
        run: xcrun simctl list devices available | grep "iPhone" | head -5

      - name: ビルド
        run: |
          # 利用可能なiPhoneシミュレータを自動検出
          SIM_NAME=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^ *//' | sed 's/ (.*//')
          if [ -z "$SIM_NAME" ]; then
            echo "シミュレータが見つからないため generic destination でビルド"
            xcodebuild build \
              -project AccessRoute.xcodeproj \
              -scheme AccessRoute \
              -destination 'generic/platform=iOS Simulator' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "シミュレータ: $SIM_NAME"
            xcodebuild build \
              -project AccessRoute.xcodeproj \
              -scheme AccessRoute \
              -destination "platform=iOS Simulator,name=$SIM_NAME" \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: テスト実行
        run: |
          SIM_NAME=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^ *//' | sed 's/ (.*//')
          if [ -z "$SIM_NAME" ]; then
            echo "::warning::シミュレータが見つからないためテストをスキップ"
            exit 0
          fi
          echo "シミュレータ: $SIM_NAME"
          xcodebuild test \
            -project AccessRoute.xcodeproj \
            -scheme AccessRoute \
            -destination "platform=iOS Simulator,name=$SIM_NAME" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
